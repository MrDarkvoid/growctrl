#==============================================================================
# GROWCTRL – Checkup-Karte Zelt Mittel (LEGACY)
# Projekt : GROWCTRL – Home-Assistant-Gesamtsystem fuer Growzelte
# Zweck   : button-card mit JS-Lambda: Uebersicht Zelt Mittel. Wird durch den GROWCTRL
#           Karten-Cluster ersetzt (Phase 2).
# Bezug   : Liest Helper/Logs/Restzeit-Sensoren aus legacy/packages/hydro_zelt_mittel.yaml
# Version : 2.0.0-dev  |  Lizenz: MIT
# Autor   : MrDarkvoid – entwickelt in Zusammenarbeit mit Claude (Anthropic), Vibe Coding
#==============================================================================

type: custom:button-card
entity: sensor.us_grow_zelt_mittel_temperature
show_name: false
show_icon: false
show_state: false
show_label: true
tap_action:
  action: navigate
  navigation_path: /grow-zelt/gz_mittel
label: |-
  [[[
    const THEME = {
      label:    'rgba(255,255,255,0.85)',
      value:    'rgba(255,255,255,1.0)',
      muted:    'rgba(255,255,255,0.50)',
      logLabel: 'rgba(255,255,255,0.75)',
      logText:  'rgba(255,255,255,0.88)',
      ok:       '#4DFFC3',
      warn:     '#FFD166',
      crit:     '#FF6B6B',
      info:     '#FFD166',
      tileBg:   'rgba(0,0,0,0.20)',
      rowBg:    'rgba(0,0,0,0.18)',
    };

    const temp  = states['sensor.us_grow_zelt_mittel_temperature']?.state;
    const hum   = states['sensor.us_grow_zelt_mittel_humidity']?.state;
    const power = states['sensor.growzelt_mittel_leistungsbezug']?.state;

    const klima  = states['input_boolean.hydro_climate_auto_mittel']?.state === 'on';
    const dehum  = states['input_boolean.hydro_dehum_request_mittel']?.state === 'on';
    const maint  = states['input_boolean.hydro_maintenance_mittel']?.state === 'on';

    const t  = temp  && !['unknown','unavailable'].includes(temp)  ? parseFloat(temp).toFixed(1)   : '--';
    const h  = hum   && !['unknown','unavailable'].includes(hum)   ? Math.round(parseFloat(hum))   : '--';
    const pW = power && !['unknown','unavailable'].includes(power) ? Math.round(parseFloat(power)) : '--';
    const vpd = (temp && hum && !['unknown','unavailable'].includes(temp))
      ? (() => { const T=parseFloat(temp),H=parseFloat(hum); return (0.6107*Math.exp(17.38*T/(239+T))*(1-H/100)).toFixed(2); })()
      : '--';

    const fmtMin = m => m===null ? '–' : m<60 ? `${m} min` : `${Math.floor(m/60)}h ${m%60}min`;
    const toMin  = s => { const p=s.split(' ').pop().substring(0,5).split(':'); return parseInt(p[0])*60+parseInt(p[1]); };

    const stageBadge = (stage) => {
      const map = {
        'Seedling': { bg:'rgba(100,180,255,0.2)',  color:'#7EC8FF' },
        'Veg':      { bg:'rgba(100,220,100,0.25)', color:'#7EE87E' },
        'Bloom':    { bg:'rgba(255,180,50,0.25)',  color:'#FFB432' },
        'Flush':    { bg:'rgba(255,180,50,0.25)',  color:'#FFB432' },
      };
      const s = map[stage] || { bg:'rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.5)' };
      return `<span style="font-size:10px;font-weight:700;background:${s.bg};color:${s.color};padding:3px 9px;border-radius:9px;margin-left:6px">${stage||'–'}</span>`;
    };

    const barRow = (icon, fillStyle, timeText, timeColor) => `
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:12px;flex-shrink:0">${icon}</span>
        <div style="flex:1;height:10px;background:rgba(0,0,0,.3);border-radius:5px;overflow:hidden">
          <div style="${fillStyle};height:100%;border-radius:5px"></div>
        </div>
        <span style="font-size:11px;color:${timeColor};min-width:82px;flex-shrink:0;text-align:right">${timeText}</span>
      </div>`;

    const auto1   = states['input_boolean.hydro_auto_mittel_main1']?.state === 'on';
    const licht   = states['switch.fs_gz_mittel_licht']?.state === 'on';
    const stage   = states['input_select.hydro_stage_mittel_main1']?.state || '';
    const log     = states['input_text.hydro_log_mittel_main1']?.state || '';
    const lrRaw   = states['sensor.mittel_main1_licht_restzeit']?.state;
    const prRaw   = states['sensor.mittel_main1_pumpe_restzeit']?.state;
    const lr      = lrRaw && !['unknown','unavailable'].includes(lrRaw) ? parseInt(lrRaw) : null;
    const pr      = prRaw && !['unknown','unavailable'].includes(prRaw) ? parseInt(prRaw) : null;
    const dtOn    = states['input_datetime.hydro_light_on_mittel_main1']?.state || '';
    const dtSV    = states['input_datetime.hydro_light_off_sv_mittel_main1']?.state || '';
    const dtB     = states['input_datetime.hydro_light_off_bloom_mittel_main1']?.state || '';
    const onM     = dtOn ? toMin(dtOn) : 0;
    const offM    = (stage==='Bloom'||stage==='Flush') ? (dtB?toMin(dtB):0) : (dtSV?toMin(dtSV):0);
    let dayMin    = offM - onM; if (dayMin<=0) dayMin+=24*60;
    const nightMin = 24*60 - dayMin;
    const sk      = stage==='Seedling'?'seedling':stage==='Veg'?'veg':'bloom';
    const pOnV    = parseFloat(states[`input_number.hydro_pump_on_${sk}_mittel_main1`]?.state  || 10);
    const pOffV   = parseFloat(states[`input_number.hydro_pump_off_${sk}_mittel_main1`]?.state || 15);
    const pCyc    = pOnV + pOffV;
    const pumpeAn = log.match(/IST.*?\bP=(\w+)/i)?.[1] === 'on';
    const lPct    = (lr!==null && dayMin>0)   ? Math.min(100,Math.round((lr/dayMin)*100))   : 0;
    const nPct    = (lr!==null && nightMin>0) ? Math.min(100,Math.round((lr/nightMin)*100)) : 0;
    const pPct    = (pr!==null && pCyc>0)     ? Math.min(100,Math.round((pr/pCyc)*100))     : 0;

    let lichtDot, lichtLbl;
    if (licht)      { lichtDot='#FFD700'; lichtLbl=`<span style="font-size:11px;color:rgba(255,255,255,0.85);font-weight:700">💡 AN</span>`; }
    else if (auto1) { lichtDot='#8B9FC4'; lichtLbl=`<span style="font-size:11px;color:#B0BED4;font-weight:700">🌙 AUS</span>`; }
    else            { lichtDot='rgba(255,255,255,0.18)'; lichtLbl=`<span style="font-size:11px;color:rgba(255,255,255,0.3)">💡 Auto AUS</span>`; }

    const autoBadge = auto1
      ? `<span style="font-size:10px;font-weight:700;background:rgba(77,255,195,0.15);color:#4DFFC3;padding:3px 9px;border-radius:9px">Auto AN</span>`
      : `<span style="font-size:10px;font-weight:700;background:rgba(255,107,107,0.15);color:#FF6B6B;padding:3px 9px;border-radius:9px">Auto AUS</span>`;

    let lichtBar;
    if (licht)      lichtBar = barRow('💡', `background:linear-gradient(90deg,#FFD700,#FFA500);width:${lPct}%`, fmtMin(lr), THEME.muted);
    else if (auto1) lichtBar = barRow('🌙', `background:linear-gradient(90deg,#8B9FC4,#5B6F96);width:${nPct}%`, `AN in ${fmtMin(lr)}`, THEME.label);
    else            lichtBar = barRow('<span style="opacity:0.25">💡</span>', 'width:0%', '–', 'rgba(255,255,255,0.25)');

    const pumpeBar = pumpeAn
      ? barRow('💧', `background:linear-gradient(90deg,#4FC3F7,#0288D1);width:${pPct}%`, fmtMin(pr), THEME.muted)
      : barRow('<span style="opacity:0.25">💧</span>', 'width:0%', '–', 'rgba(255,255,255,0.25)');

    const translateKlimaLog = (raw) => {
      if (!raw || ['unknown','unavailable',''].includes(raw)) return { level:'none', label:'—', ts:'' };
      const ts = raw.length>=16 ? raw.substring(11,16) : '';
      if (raw.includes('SENSOR INVALID'))  return { level:'critical', label:'🚨 Sensor ungültig — Befeuchtung gesperrt', ts };
      if (raw.includes('MAINTENANCE'))     return { level:'info',     label:'🔧 Wartungsmodus aktiv', ts };
      if (raw.includes('TESTMODE'))        return { level:'info',     label:'🧪 Testmodus aktiv', ts };
      if (raw.includes('AUTO OFF'))        return { level:'info',     label:'🔴 Klima-Automatik deaktiviert', ts };
      const circ = raw.match(/(?:IST|SOLL)\s+(?:F|CIRC)=(\w+)/i)?.[1]?.toLowerCase();
      const humM = raw.match(/IST\s+(?:CIRC|F)=\w+\s+HUM=(\w+)/i)?.[1]?.toUpperCase();
      const reqM = raw.match(/REQ=(\w+)/i)?.[1]?.toUpperCase();
      if (humM !== undefined) {
        const parts = [];
        if      (circ==='on')     parts.push('Umluft AN');
        else if (circ==='manual') parts.push('Umluft Manuell');
        else if (circ==='off')    parts.push('Umluft AUS');
        parts.push(humM==='ON' ? 'Befeuchtung AN' : 'Befeuchtung AUS');
        parts.push(reqM==='ON'  ? 'Entfeuchtung AN' : 'Entfeuchtung AUS');
        if (raw.includes('ZENTRAL-BLOCK')) parts.push('(Zentral-Block)');
        return { level:'ok', label:parts.join(' · '), ts };
      }
      return { level:'ok', label:raw.replace(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}\s*/,'').substring(0,45), ts };
    };

    const translateStationLog = (raw) => {
      if (!raw || ['unknown','unavailable',''].includes(raw)) return { level:'none', label:'—', ts:'' };
      const ts = raw.length>=16 ? raw.substring(11,16) : '';
      if (raw.includes('FAILSAFE LIGHT'))  return { level:'critical', label:'🚨 Failsafe: Licht-Zwangsabschaltung — Auto deaktiviert', ts };
      if (raw.includes('FAILSAFE PUMP'))   return { level:'critical', label:'🚨 Failsafe: Pumpen-Zwangsabschaltung — Auto deaktiviert', ts };
      if (raw.includes('TIME INVALID'))    return { level:'critical', label:'⚠️ Lichtzeiten nicht konfiguriert', ts };
      if (raw.includes('MISMATCH')) {
        const istL=raw.match(/IST.*?\bL=(\w+)/i)?.[1], sollL=raw.match(/SOLL.*?\bL=(\w+)/i)?.[1];
        const istP=raw.match(/IST.*?\bP=(\w+)/i)?.[1], sollP=raw.match(/SOLL.*?\bP=(\w+)/i)?.[1];
        const istO2=raw.match(/IST.*?\bO2=(\w+)/i)?.[1], sollO2=raw.match(/SOLL.*?\bO2=(\w+)/i)?.[1];
        const issues=[];
        if(istL&&sollL&&istL!==sollL)     issues.push(`Licht (IST ${istL.toUpperCase()} / SOLL ${sollL.toUpperCase()})`);
        if(istP&&sollP&&istP!==sollP)     issues.push(`Pumpe (IST ${istP.toUpperCase()} / SOLL ${sollP.toUpperCase()})`);
        if(istO2&&sollO2&&istO2!==sollO2) issues.push(`O₂ (IST ${istO2.toUpperCase()} / SOLL ${sollO2.toUpperCase()})`);
        return { level:'warning', label:'⚠️ Gerät antwortet nicht: '+(issues.join(', ')||'Abweichung'), ts };
      }
      if (raw.includes('MAINTENANCE'))  return { level:'info', label:'🔧 Wartungsmodus aktiv', ts };
      if (raw.includes('TESTMODE'))     return { level:'info', label:'🧪 Testmodus aktiv', ts };
      const istL=raw.match(/IST.*?\bL=(\w+)/i)?.[1];
      const istP=raw.match(/IST.*?\bP=(\w+)/i)?.[1];
      const istO2=raw.match(/IST.*?\bO2=(\w+)/i)?.[1];
      const ovr=raw.includes('OVRUNTIL')?' (Override aktiv)':'';
      const stateStr=[
        istL  &&istL  !=='n/a'?(istL  ==='on'?'💡 Licht AN' :'🌑 Licht AUS') :null,
        istP  &&istP  !=='n/a'?(istP  ==='on'?'💧 Pumpe AN' :'⏸️ Pumpe AUS'):null,
        istO2 &&istO2 !=='n/a'?(istO2 ==='on'?'🫧 O₂ AN'   :'🫧 O₂ AUS')   :null,
      ].filter(Boolean).join(' · ');
      let prefix='';
      if      (raw.includes('AUTO ON'))        prefix='🟢 Auto gestartet';
      else if (raw.includes('AUTO OFF'))        prefix='🔴 Auto gestoppt';
      else if (raw.match(/STAGE\s*→/))          { const s=raw.match(/STAGE\s*→\s*(\w+)/)?.[1]; prefix=`🌱 Phase: ${s||''}`; }
      else if (raw.includes('LIGHT → ON'))      prefix='💡 Licht eingeschaltet';
      else if (raw.includes('LIGHT → OFF'))     prefix='🌑 Licht ausgeschaltet';
      else if (raw.includes('PUMP → ON'))       prefix='💧 Pumpe eingeschaltet';
      else if (raw.includes('PUMP → OFF'))      prefix='⏸️ Pumpe ausgeschaltet';
      else if (raw.includes('O2 → ON'))         prefix='🫧 O₂ eingeschaltet';
      else if (raw.includes('FAN → ON'))        prefix='🌀 Lüfter eingeschaltet';
      else if (raw.includes('MANUAL OVERRIDE')) prefix='✋ Manuell übersteuert';
      else if (raw.includes('OVERRIDE END'))    prefix='✅ Override beendet';
      const label=[prefix,stateStr].filter(Boolean).join(' — ')+ovr;
      return { level:'ok', label:label||raw.substring(17,55), ts };
    };

    const lkBg   = { critical:'rgba(255,107,107,.22)', warning:'rgba(255,209,102,.2)', info:'rgba(255,209,102,.15)', ok:THEME.rowBg, none:'rgba(0,0,0,.12)' };
    const lkText = { critical:THEME.crit, warning:THEME.warn, info:THEME.info, ok:THEME.logText, none:'rgba(255,255,255,.35)' };

    const rS = translateStationLog(log);
    const rK = translateKlimaLog(states['input_text.hydro_climate_log_mittel']?.state);
    const blockBg = rS.level==='critical' ? 'rgba(255,107,107,0.08)' : 'rgba(0,0,0,0.15)';

    const klimaRow = `
      <div style="display:flex;align-items:center;gap:6px;background:${lkBg[rK.level]};border-radius:8px;padding:6px 10px">
        <span style="font-size:11px;font-weight:700;color:${THEME.logLabel};min-width:42px;flex-shrink:0">Klima</span>
        <span style="font-size:11px;color:${lkText[rK.level]};overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1">${rK.label}</span>
        ${rK.ts?`<span style="font-size:10px;color:${THEME.muted};flex-shrink:0">${rK.ts}</span>`:''}
      </div>`;

    const allLevels = [rK.level, rS.level];
    let warnLabel, warnColor;
    if (allLevels.includes('critical'))          { warnLabel='🚨 Fehler';   warnColor=THEME.crit; }
    else if (allLevels.includes('warning'))      { warnLabel='⚠️ Warnung';  warnColor=THEME.warn; }
    else if (dehum)                              { warnLabel='💧 Dehum AN'; warnColor=THEME.warn; }
    else if (parseFloat(t)<18||parseFloat(t)>30) { warnLabel='⚠️ Temp!';   warnColor=THEME.warn; }
    else if (allLevels.includes('info'))         { warnLabel='ℹ️ Info';     warnColor=THEME.info; }
    else                                         { warnLabel='✓ Alles OK';  warnColor=THEME.ok;   }

    return `<div style="border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#E87B2E,#C45A10);padding:16px 18px;cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:20px;font-weight:800;color:#fff;letter-spacing:-.3px">Zelt Mittel</div>
          <div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:3px">Grow · Main</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
          ${klima?'<span style="font-size:10px;font-weight:700;background:rgba(255,255,255,.2);color:#fff;padding:3px 9px;border-radius:20px">⚙ Klima Auto</span>':''}
          <span style="font-size:10px;font-weight:700;background:rgba(255,255,255,.2);color:#fff;padding:3px 9px;border-radius:20px">${auto1?'1/1':'0/1'} Auto</span>
          ${maint?'<span style="font-size:10px;font-weight:700;background:rgba(255,165,0,.5);color:#fff;padding:3px 9px;border-radius:20px">🔧 Wartung</span>':''}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px">
        <div style="background:${THEME.tileBg};border-radius:12px;padding:10px 12px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:${THEME.label}">Temperatur</div>
          <div style="font-size:24px;font-weight:800;color:${THEME.value}">${t}°C</div>
        </div>
        <div style="background:${THEME.tileBg};border-radius:12px;padding:10px 12px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:${THEME.label}">Luftfeuchte</div>
          <div style="font-size:24px;font-weight:800;color:${THEME.value}">${h}%</div>
        </div>
        <div style="background:${THEME.tileBg};border-radius:12px;padding:10px 12px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:${THEME.label}">VPD</div>
          <div style="font-size:24px;font-weight:800;color:${THEME.value}">${vpd}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <div style="background:${THEME.tileBg};border-radius:12px;padding:8px 12px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:${THEME.label}">Leistung</div>
          <div style="font-size:18px;font-weight:700;color:${THEME.value}">⚡ ${pW} W</div>
        </div>
        <div style="background:${THEME.tileBg};border-radius:12px;padding:8px 12px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:${THEME.label}">Status</div>
          <div style="font-size:16px;font-weight:700;color:${warnColor}">${warnLabel}</div>
        </div>
      </div>
      <div style="margin-top:8px">
        <div style="background:${blockBg};border-radius:12px;padding:10px 13px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:800;color:rgba(255,255,255,0.92)">Grow · Main</span>
            ${stageBadge(stage)}
            <div style="flex:1"></div>
            <div style="width:8px;height:8px;border-radius:50%;background:${lichtDot};flex-shrink:0"></div>
            ${lichtLbl}
            <div style="margin-left:4px">${autoBadge}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:9px">
            ${lichtBar}
            ${pumpeBar}
          </div>
          <div style="display:flex;align-items:center;gap:6px;background:${lkBg[rS.level]};border-radius:7px;padding:5px 9px">
            <span style="font-size:11px;color:${lkText[rS.level]};overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1">${rS.label}</span>
            ${rS.ts?`<span style="font-size:10px;color:${THEME.muted};flex-shrink:0">${rS.ts}</span>`:''}
          </div>
        </div>
      </div>
      <div style="margin-top:8px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:${THEME.muted};margin-bottom:4px">Klima Log</div>
        ${klimaRow}
      </div>
    </div>`;
  ]]]
styles:
  card:
    - background: none
    - border: none
    - box-shadow: none
    - padding: 0
  label:
    - width: 100%
