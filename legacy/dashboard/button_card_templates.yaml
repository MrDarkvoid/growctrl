#==============================================================================
# GROWCTRL – button-card Templates (LEGACY)
# Projekt : GROWCTRL – Home-Assistant-Gesamtsystem fuer Growzelte
# Zweck   : Gemeinsame button_card_templates des alten Dashboards (hydro_panel_flat,
#           hydro_cfg_section, ...). Zeilenenden auf LF normalisiert.
# Bezug   : Wird von den Checkup-Karten und dem alten Dashboard genutzt
# Version : 2.0.0-dev  |  Lizenz: GC-SAL 1.0 (siehe LICENSE)
# Autor   : MrDarkvoid – entwickelt in Zusammenarbeit mit Claude (Anthropic), Vibe Coding
#==============================================================================

button_card_templates:
  hydro_panel_flat:
    show_name: false
    show_icon: false
    show_state: false
    show_label: false
    tap_action:
      action: none
    styles:
      card:
        - background: none
        - border: none
        - box-shadow: none
        - padding: 0
  hydro_cfg_section:
    show_name: false
    show_icon: false
    show_state: false
    show_label: true
    tap_action:
      action: none
    styles:
      card:
        - background: none
        - border: none
        - box-shadow: none
        - padding: 8px 2px 2px 2px
      label:
        - justify-self: start
        - font-size: 10px
        - text-transform: uppercase
        - letter-spacing: 1px
        - color: rgba(255,255,255,0.42)
  hydro_control:
    tap_action:
      action: toggle
    styles:
      card:
        - background: >
            [[[ return entity.state === 'on' ? 'rgba(77,255,195,0.15)' :
            'rgba(0,0,0,0.20)' ]]]
        - border: >
            [[[ return entity.state === 'on' ? '1px solid rgba(77,255,195,0.25)'
            : '1px solid rgba(255,255,255,0.08)' ]]]
        - border-radius: 11px
        - padding: 10px
        - height: 58px
        - box-shadow: none
      name:
        - font-size: 11px
        - color: >
            [[[ return entity.state === 'on' ? '#4DFFC3' :
            'rgba(255,255,255,0.5)' ]]]
      icon:
        - color: >
            [[[ return entity.state === 'on' ? '#4DFFC3' :
            'rgba(255,255,255,0.3)' ]]]
        - width: 22px
  hydro_control_mittel:
    tap_action:
      action: toggle
    styles:
      card:
        - background: >
            [[[ return entity.state === 'on' ? 'rgba(232,123,46,0.18)' :
            'rgba(0,0,0,0.20)' ]]]
        - border: >
            [[[ return entity.state === 'on' ? '1px solid rgba(232,123,46,0.35)'
            : '1px solid rgba(255,255,255,0.08)' ]]]
        - border-radius: 11px
        - padding: 10px
        - height: 58px
        - box-shadow: none
      name:
        - font-size: 11px
        - color: >
            [[[ return entity.state === 'on' ? '#E87B2E' :
            'rgba(255,255,255,0.5)' ]]]
      icon:
        - color: >
            [[[ return entity.state === 'on' ? '#E87B2E' :
            'rgba(255,255,255,0.3)' ]]]
        - width: 22px
  hydro_control_gross:
    tap_action:
      action: toggle
    styles:
      card:
        - background: >
            [[[ return entity.state === 'on' ? 'rgba(123,79,190,0.22)' :
            'rgba(0,0,0,0.20)' ]]]
        - border: >
            [[[ return entity.state === 'on' ? '1px solid rgba(123,79,190,0.4)'
            : '1px solid rgba(255,255,255,0.08)' ]]]
        - border-radius: 11px
        - padding: 10px
