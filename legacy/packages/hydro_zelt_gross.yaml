template:
  - sensor:
      - name: "Groß Main1 Licht Restzeit"
        unique_id: hydro_gross_main1_light_restmin
        unit_of_measurement: "min"
        state: >
          {% set stage = states('input_select.hydro_stage_gross_main1') %}
          {% set on_str  = states('input_datetime.hydro_light_on_gross_main1').split(' ')[-1][0:5] %}
          {% set off_sv  = states('input_datetime.hydro_light_off_sv_gross_main1').split(' ')[-1][0:5] %}
          {% set off_b   = states('input_datetime.hydro_light_off_bloom_gross_main1').split(' ')[-1][0:5] %}
          {% set now_m = now().hour*60 + now().minute %}
          {% set on_m = (on_str.split(':')[0]|int)*60 + (on_str.split(':')[1]|int) %}
          {% set off_sv_m = (off_sv.split(':')[0]|int)*60 + (off_sv.split(':')[1]|int) %}
          {% set off_b_m  = (off_b.split(':')[0]|int)*60 + (off_b.split(':')[1]|int) %}
          {% set off_m = off_sv_m if stage in ['Seedling','Veg'] else off_b_m %}
          {% if on_m == off_m %}0
          {% elif on_m < off_m %}
            {% if now_m < on_m %}{{ on_m-now_m }}
            {% elif now_m < off_m %}{{ off_m-now_m }}
            {% else %}{{ (24*60-now_m)+on_m }}{% endif %}
          {% else %}
            {% if now_m >= on_m or now_m < off_m %}
              {% if now_m >= on_m %}{{ (24*60-now_m)+off_m }}{% else %}{{ off_m-now_m }}{% endif %}
            {% else %}{{ on_m-now_m }}{% endif %}
          {% endif %}

      - name: "Groß Main1 Pumpe Restzeit"
        unique_id: hydro_gross_main1_pump_restmin
        unit_of_measurement: "min"
        state: >
          {% set stage = states('input_select.hydro_stage_gross_main1') %}
          {% set on_s  = states('input_number.hydro_pump_on_seedling_gross_main1')|int(10) %}
          {% set off_s = states('input_number.hydro_pump_off_seedling_gross_main1')|int(15) %}
          {% set on_v  = states('input_number.hydro_pump_on_veg_gross_main1')|int(10) %}
          {% set off_v = states('input_number.hydro_pump_off_veg_gross_main1')|int(15) %}
          {% set on_b  = states('input_number.hydro_pump_on_bloom_gross_main1')|int(10) %}
          {% set off_b = states('input_number.hydro_pump_off_bloom_gross_main1')|int(15) %}
          {% set minutes_today = now().hour*60 + now().minute %}
          {% if stage == 'Seedling' %}{% set on=on_s %}{% set off=off_s %}
          {% elif stage == 'Veg' %}{% set on=on_v %}{% set off=off_v %}
          {% else %}{% set on=on_b %}{% set off=off_b %}{% endif %}
          {% set cycle = on+off %}
          {% if cycle == 0 %}0{% else %}
            {% set phase = minutes_today % cycle %}
            {{ (on-phase) if phase < on else (cycle-phase) }}
          {% endif %}

      - name: "Groß Main2 Licht Restzeit"
        unique_id: hydro_gross_main2_light_restmin
        unit_of_measurement: "min"
